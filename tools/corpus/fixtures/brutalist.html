<!doctype html><html><head><meta charset="utf-8"><title>brutalist</title><style>
  :root{--bg:#f4f3ee;--fg:#0a0a0a;--accent:#1f39ff;--s2:16px;--s3:24px;--s4:40px}
  *{margin:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font-family:"Archivo",ui-sans-serif,sans-serif;line-height:1.5}
  .wrap{max-width:1080px;margin:0 auto;padding:56px var(--s4)}
  .top{display:flex;justify-content:space-between;border-bottom:3px solid var(--fg);padding-bottom:var(--s2);font-weight:800;text-transform:uppercase;font-size:14px;letter-spacing:.04em}
  h1{font-size:76px;line-height:.98;font-weight:900;letter-spacing:-.03em;text-transform:uppercase;margin:var(--s4) 0 var(--s3);max-width:14ch}
  .lede{font-size:19px;max-width:52ch;margin-bottom:var(--s4);font-weight:500}
  .cta{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;padding:14px 28px;font-weight:800;text-transform:uppercase;font-size:15px;border:3px solid var(--fg)}
  .rule{margin-top:56px;border-top:3px solid var(--fg);padding-top:var(--s2);font-weight:700;font-size:14px}
</style></head><body>
  <main class="wrap">
    <div class="top"><span>Type Foundry</span><span>Est. 2019</span></div>
    <h1>Ink that refuses to whisper.</h1>
    <p class="lede">Seven display families built for posters that have to win a wall from across the street. Licensed per-weight, no subscription.</p>
    <a class="cta" href="#">See the specimens</a>
    <div class="rule">42 weights · variable · trial fonts free</div>
  </main>
</body></html>
