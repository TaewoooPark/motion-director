<!doctype html><html><head><meta charset="utf-8"><title>gradient</title><style>
  *{margin:0;box-sizing:border-box;font-family:Inter,-apple-system,sans-serif}
  body{background:#0f0c1d;color:#e5e7eb;text-align:center}
  .hero{min-height:520px;background:linear-gradient(135deg,#6d28d9,#2563eb 60%,#06b6d4);padding:96px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .pill{display:inline-block;background:rgba(255,255,255,.15);color:#ddd6fe;padding:8px 16px;border-radius:9999px;font-size:14px;margin-bottom:24px}
  h1{font-size:60px;font-weight:800;letter-spacing:-.02em;background:linear-gradient(90deg,#fff,#c4b5fd);-webkit-background-clip:text;background-clip:text;color:transparent;max-width:16ch;margin:0 auto 20px}
  .sub{color:#c7bfe8;font-size:20px;max-width:46ch;margin:0 auto 30px}
  .cta{display:inline-block;background:#fff;color:#6d28d9;text-decoration:none;padding:15px 34px;border-radius:14px;font-weight:700;font-size:17px}
</style></head><body>
  <section class="hero">
    <span class="pill">Introducing v2.0</span>
    <h1>Build the future, faster than ever</h1>
    <p class="sub">The next-generation platform that empowers teams to ship world-class products at unprecedented speed.</p>
    <a class="cta" href="#">Get started today</a>
  </section>
</body></html>
